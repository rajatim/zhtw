name: SDK TypeScript

on:
  push:
    branches: [main]
    paths:
      - 'sdk/typescript/**'
      - 'sdk/data/**'
      - '.github/workflows/sdk-typescript.yml'
  pull_request:
    paths:
      - 'sdk/typescript/**'
      - 'sdk/data/**'
      - '.github/workflows/sdk-typescript.yml'
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: sdk/typescript
        run: pnpm install --frozen-lockfile
      - name: Type-check
        working-directory: sdk/typescript
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: sdk/typescript
        run: pnpm test
      - name: Build
        working-directory: sdk/typescript
        run: pnpm build
      - name: Verify dist layout
        working-directory: sdk/typescript
        run: |
          test -f dist/index.node.mjs
          test -f dist/index.node.cjs
          test -f dist/index.node.d.ts
          test -f dist/index.browser.mjs
          test -f dist/index.browser.cjs
          test -f dist/index.browser.d.ts
          test -f dist/zhtw-data.json
      - name: Pack + install smoke test
        working-directory: sdk/typescript
        env:
          ZHTW_TS_RUN_PACK: '1'
        run: npx vitest run tests/pack.test.ts

  publish:
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) — no NPM_TOKEN required.
    # Configured at: https://www.npmjs.com/package/zhtw-js/access
    # Trusted publisher: rajatim/zhtw → .github/workflows/sdk-typescript.yml
    permissions:
      contents: read
      id-token: write  # Required: GitHub OIDC token for npm Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: sdk/typescript
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: sdk/typescript
        run: pnpm build
      - name: Upgrade npm to >= 11.5.1 (required for Trusted Publishing OIDC)
        run: npm install -g npm@latest
      - name: Publish to npm (Trusted Publishing OIDC, no token)
        working-directory: sdk/typescript
        run: npm publish --access public --provenance
