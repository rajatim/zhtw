name: SDK Conformance

on:
  push:
    branches: [main]
    paths:
      - 'src/zhtw/converter.py'
      - 'src/zhtw/matcher.py'
      - 'src/zhtw/export.py'
      - 'sdk/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/sdk-conformance.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/zhtw/converter.py'
      - 'src/zhtw/matcher.py'
      - 'src/zhtw/export.py'
      - 'sdk/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/sdk-conformance.yml'
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  actions: write

jobs:
  test-all:
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - name: Validate root release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: '[[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Python dependencies
        run: uv sync --extra dev
      - name: Run release gate
        run: make release-gate

  dispatch-publish:
    if: >-
      github.event_name == 'release' &&
      github.event.action == 'published' &&
      startsWith(github.event.release.tag_name, 'v')
    needs: test-all
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch registry publish workflows at the release tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh workflow run publish.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f publish=true
          gh workflow run sdk-java.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f publish=true
          gh workflow run sdk-typescript.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f publish=true
          gh workflow run sdk-rust.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f publish=true
          gh workflow run sdk-dotnet.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG" -f publish=true
          gh workflow run go-binary.yml --repo "$GITHUB_REPOSITORY" --ref "sdk/go/$TAG" -f tag="sdk/go/$TAG"
