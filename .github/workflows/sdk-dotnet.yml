name: SDK .NET

on:
  push:
    paths: ['sdk/dotnet/**', 'sdk/data/**', '.github/workflows/sdk-dotnet.yml']
  pull_request:
    paths: ['sdk/dotnet/**', 'sdk/data/**', '.github/workflows/sdk-dotnet.yml']
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        working-directory: sdk/dotnet
        run: dotnet build tests/Zhtw.Tests/Zhtw.Tests.csproj -c Release
      - name: Test
        working-directory: sdk/dotnet
        run: dotnet test tests/Zhtw.Tests/Zhtw.Tests.csproj -c Release --logger "console;verbosity=detailed"
