name: SDK .NET

on:
  push:
    paths: ['sdk/dotnet/**', 'sdk/data/**', '.github/workflows/sdk-dotnet.yml']
  pull_request:
    paths: ['sdk/dotnet/**', 'sdk/data/**', '.github/workflows/sdk-dotnet.yml']
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build library (both targets)
        working-directory: sdk/dotnet
        run: dotnet build Zhtw.csproj -c Release
      - name: Build tests
        working-directory: sdk/dotnet
        run: dotnet build tests/Zhtw.Tests/Zhtw.Tests.csproj -c Release --no-dependencies
      - name: Test
        working-directory: sdk/dotnet
        run: dotnet test tests/Zhtw.Tests/Zhtw.Tests.csproj -c Release --no-build --logger "console;verbosity=detailed"
      - name: Pack
        if: github.event_name == 'release'
        working-directory: sdk/dotnet
        run: dotnet pack Zhtw.csproj -c Release --no-build -o ./nupkg
      - name: Publish to NuGet
        if: github.event_name == 'release'
        working-directory: sdk/dotnet
        run: dotnet nuget push nupkg/*.nupkg -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }}
